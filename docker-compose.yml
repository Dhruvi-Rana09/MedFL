services:

  aggregator:
    build: ./aggregator-service
    ports:
      - "8000:8000"
    environment:
      - AUTH_URL=http://auth:8000

  hospital1:
    build: ./hospital-node
    ports:
      - "8011:8000"
    environment:
      - HOSPITAL_ID=hospital-1
      - AUTH_URL=http://auth:8000

  hospital2:
    build: ./hospital-node
    ports:
      - "8012:8000"
    environment:
      - HOSPITAL_ID=hospital-2
      - AUTH_URL=http://auth:8000

  hospital3:
    build: ./hospital-node
    ports:
      - "8013:8000"
    environment:
      - HOSPITAL_ID=hospital-3
      - AUTH_URL=http://auth:8000

  hospital4:
    build: ./hospital-node
    ports:
      - "8014:8000"
    environment:
      - HOSPITAL_ID=hospital-4
      - AUTH_URL=http://auth:8000

  hospital5:
    build: ./hospital-node
    ports:
      - "8015:8000"
    environment:
      - HOSPITAL_ID=hospital-5
      - AUTH_URL=http://auth:8000

  auth:
    build: ./auth-service # Build from Dockerfile in this folder
    ports:
      - "8003:8000" # laptop:8000 → container:8000
    networks: [ medfl-net ]
    environment:
      REDIS_URL: redis://redis:6379 # env var passed into the container
    volumes:
      - ./auth-service/certs:/app/certs

  redis:
    image: redis:7-alpine # Pull this image from Docker Hub
    networks: [ medfl-net ]
  storage:
    build: ./model-storage-service
    ports:
      - "8004:8000"
    volumes:
      - ./model-storage-service/app/models:/app/app/models

  monitor:
    build: ./monitoring-service
    ports:
      - "8005:8000"
    volumes:
      - monitor-data:/app/data
    environment:
      - AUTH_URL=http://auth:8000

  dashboard:
    build:
      context: ./monitoring-service
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    depends_on:
      - storage
      - monitor

volumes:
  storage-data:
  monitor-data:
