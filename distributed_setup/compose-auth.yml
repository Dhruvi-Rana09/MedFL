version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════
#  Device 1: Auth Node (Identity Provider)
#
#  Uses bridge networking (host mode is not supported on Windows Docker Desktop).
#  Auth binds on host port 8001; Redis is internal only.
# ═══════════════════════════════════════════════════════════════════════════

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  auth:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: redis://redis:6379/0
      JWT_PRIVATE_KEY_PATH: certs/private.pem
      JWT_PUBLIC_KEY_PATH: certs/public.pem
      PORT: "8001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8001/health'); r.raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
