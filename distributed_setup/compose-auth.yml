version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════
#  Device 1: Auth Node (Identity Provider)
# ═══════════════════════════════════════════════════════════════════════════

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  auth:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: redis://localhost:6379/0  # Uses localhost because Redis is on the same machine
      JWT_PRIVATE_KEY_PATH: certs/private.pem
      JWT_PUBLIC_KEY_PATH: certs/public.pem
      PORT: "8001"  # Bind on 8001 so multiple services can co-exist on one machine
    depends_on:
      redis:
        condition: service_healthy
    network_mode: "host" # Bind directly to host networking
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8001/health'); r.raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
