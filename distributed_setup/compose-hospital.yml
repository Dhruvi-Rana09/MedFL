version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════
#  Edge Node: Hospital Client
#
#  Run ONE hospital per command — set env vars before each launch:
#
#  Hospital A (port 8010):
#    $env:HOSPITAL_ID="hospital-a"; $env:HOSPITAL_PORT="8010"; $env:HOSPITAL_URL="http://<THIS_DEVICE_LAN_IP>:8010"
#    docker compose -f compose-hospital.yml --env-file medfl.env up -d
#
#  Hospital B (port 8011) — same device or different:
#    $env:HOSPITAL_ID="hospital-b"; $env:HOSPITAL_PORT="8011"; $env:HOSPITAL_URL="http://<THIS_DEVICE_LAN_IP>:8011"
#    docker compose -f compose-hospital.yml --env-file medfl.env up -d
#
#  Hospital C (port 8012):
#    $env:HOSPITAL_ID="hospital-c"; $env:HOSPITAL_PORT="8012"; $env:HOSPITAL_URL="http://<THIS_DEVICE_LAN_IP>:8012"
#    docker compose -f compose-hospital.yml --env-file medfl.env up -d
#
#  Multiple hospitals on the SAME device is fully supported — each just
#  needs a unique HOSPITAL_ID and HOSPITAL_PORT.
# ═══════════════════════════════════════════════════════════════════════════

services:
  hospital-node:
    build:
      context: ../services/hospital_node
      dockerfile: Dockerfile
    # container_name makes each instance identifiable in `docker ps`
    container_name: medfl-${HOSPITAL_ID:-hospital-a}
    ports:
      - "${HOSPITAL_PORT:-8010}:${HOSPITAL_PORT:-8010}"
    env_file:
      - medfl.env   # Inherits all service URLs (AUTH_URL, ORCHESTRATOR_GRPC, etc.)
    environment:
      HOSPITAL_ID: ${HOSPITAL_ID:-hospital-a}
      HOSPITAL_PASSWORD: ${HOSPITAL_PASSWORD:-hospital_a_pass}
      # HOSPITAL_URL is what the orchestrator calls back to reach THIS node.
      # Must be this device's LAN IP + the chosen port.
      HOSPITAL_URL: ${HOSPITAL_URL:-http://localhost:8010}
      DATA_PATH: /data/dataset.pkl
      # PORT tells uvicorn which port to bind — must match HOSPITAL_PORT above
      PORT: ${HOSPITAL_PORT:-8010}
    volumes:
      # Each hospital reads from its own data subfolder
      - ../data/${HOSPITAL_ID:-hospital_a}:/data:ro

    restart: unless-stopped
