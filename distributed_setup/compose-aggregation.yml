version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════
#  Device 3: Aggregation Node (Compute Plane)
# ═══════════════════════════════════════════════════════════════════════════

services:
  aggregation:
    build:
      context: ../services/aggregation
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    network_mode: "host"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
