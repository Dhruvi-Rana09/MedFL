version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════
#  Device 5: Storage Node
#
#  Uses bridge networking (host mode is not supported on Windows Docker Desktop).
#  MinIO on host port 9000/9001; model-storage on host port 8005.
# ═══════════════════════════════════════════════════════════════════════════

services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  model-storage:
    build:
      context: ../services/model_storage
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    environment:
      PORT: "8005"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: medfl-models
      MINIO_SECURE: "false"
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  minio-data:
