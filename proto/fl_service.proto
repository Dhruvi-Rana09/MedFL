syntax = "proto3";
package medfl;

service FLService {
  rpc GetGlobalModel  (ModelRequest)  returns (ModelResponse);
  rpc SubmitUpdate    (UpdateRequest) returns (UpdateAck);
  rpc Ping            (PingRequest)   returns (PingResponse);
}

message ModelRequest  { string hospital_id = 1; string token = 2; }
message ModelResponse {
  bytes  weights    = 1;
  int32  round_id   = 2;
  int32  n_classes  = 3;
  bool   encrypted  = 4;
  string algorithm  = 5;
  float  mu         = 6;     // FedProx proximal term coefficient
}

message UpdateRequest {
  string         hospital_id  = 1;
  string         token        = 2;
  int32          round_id     = 3;
  bytes          weight_delta = 4;
  repeated float label_dist   = 5;
  int32          n_samples    = 6;
  bool           encrypted    = 7;
  float          accuracy     = 8;   // Hospital-local accuracy after training
  float          loss         = 9;   // Hospital-local loss after training
}

message UpdateAck    { bool accepted = 1; string message = 2; }
message PingRequest  { string hospital_id = 1; }
message PingResponse { string status = 1; }
