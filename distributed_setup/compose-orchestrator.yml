version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════
#  Device 2: Orchestrator Node (Control Plane)
# ═══════════════════════════════════════════════════════════════════════════

services:
  orchestrator:
    build:
      context: ../services/orchestrator
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
      - "50051:50051"
    env_file:
      - medfl.env
    environment:
      PORT: "8002"  # Bind on 8002 to match medfl.env ORCHESTRATOR_URL
      MINIO_USER: minioadmin
      MINIO_PASS: minioadmin
      # Set these to the LAN IPs of whichever machine runs each hospital node
      HOSPITAL_A_URL: http://YOUR_LAN_IP:8010
      HOSPITAL_B_URL: http://YOUR_LAN_IP:8011
      HOSPITAL_C_URL: http://YOUR_LAN_IP:8012
    network_mode: "host" # Bind directly to host networking
    restart: unless-stopped
