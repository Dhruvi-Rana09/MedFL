version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════
#  Device 4: Monitoring Node (Telemetry plane)
# ═══════════════════════════════════════════════════════════════════════════

services:
  monitoring:
    build:
      context: ../services/monitoring
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      PORT: "8004"  # Bind on 8004 to match medfl.env MONITORING_URL

    restart: unless-stopped
